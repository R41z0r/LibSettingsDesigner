name: Package and upload

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  dispatch-release:
    name: Dispatch tagged release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="v$(date -u +'%Y.%m.%d.%H%M%S')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_tag" -m "Release $release_tag"
          git push origin "$release_tag"

          api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches"
          payload="$(jq -nc --arg ref "$release_tag" '{ref: $ref}')"
          curl -sSf -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api_url" \
            -d "$payload"

  package:
    name: BigWigsPackager
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sample package root
        run: |
          cp -R Samples/LibSettingsDesignerSample/. .
          python3 scripts/update_sample_toc.py \
            --toc LibSettingsDesignerSample.toc \
            --skip-interface \
            --addon-version "$GITHUB_REF_NAME"
          git add -f .pkgmeta CHANGELOG.md Core.lua Settings.lua LibSettingsDesignerSample.toc libs

      - name: Package and upload addon
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
